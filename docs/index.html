<!doctype html>

<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='description' content='Snake on a sphere — Teinforcement Learning Agent'>
    <meta name='author' content='Łukasz Cyran'>
    <title>Spherical Snake</title>

    <link rel="icon" type="image/png" href="icons/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0" />


    <style type='text/css'>
        *, *::before, *::after {
            margin: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body {
            background: #05080f;
            font-family: monospace;
            touch-action: none;
            padding: 0 8px;
        }
        #score, #gg {
            font-size: 2em;
            margin: 0;
            text-align: center;
            background: transparent;
            color: #00ffe7;
            text-shadow: 0 0 12px #00ffe7, 0 0 30px #00ffe788;
            letter-spacing: 0.05em;
            padding: 10px 0px;
        }
        #container {
            /* On desktop: fill most of the viewport height (canvas is ~square).
               On mobile:  fill the full width up to the phone edge. */
            width: min(95vw, calc(100vh - 200px));
            max-width: 900px;
            margin: 10px auto;
            position: relative;
        }
        #leaderboard_area {
            font-size: 1.2em;
        }
        canvas {
            border: 1px solid #00ffe722;
            box-shadow: 0 0 32px #00ffe71a, inset 0 0 40px #000a;
            display: block;
            background: #080d18;
            /* Scale to container width; internal resolution (358×360) is unchanged */
            width: 100%;
            height: auto;
        }
        #gg {
            width: 100%;
            display: none;
            position: absolute;
            top: 52px;
            /* Leave room for the viz/AI buttons stacked on the right */
            padding-right: 160px;
            text-align: left;
            padding-left: 12px;
        }
        .hidden {
            display: none;
        }

        /* ---- Mobile controls ---- */
        /* The controls div sits after the canvas in the DOM but floats
           back up over the bottom of the canvas via negative top margin. */
        #mobile_controls {
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            height: 10px;
            top: -100px;
        }

        .button {
            background: #0d1a2a;
            display: inline-block;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            border-radius: 50px;
            border: 2px solid #00ffe755;
            box-shadow: 0 0 10px #00ffe733;
            position: absolute;
            cursor: pointer;
            touch-action: manipulation;
        }

        #move_left {
            width: 80px;
            height: 80px;
            left: 10px;
            top: 10px;
            background: url("icons/left.png") center / 55% no-repeat #0d1a2a;
        }

        #move_right {
            width: 80px;
            height: 80px;
            right: 10px;
            top: 10px;
            background: url("icons/right.png") center / 55% no-repeat #0d1a2a;
        }

        #mobile_controls .button.down {
            background-color: #00ffe722;
            box-shadow: 0 0 18px #00ffe7;
        }

        #refresh {
            color: #00ffe7;
            cursor: pointer;
            text-decoration: underline;
        }

        #viz_mode_btn, #ai_toggle_btn {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,10,20,0.7);
            border: 1px solid #00ffe733;
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        #viz_mode_btn:hover, #ai_toggle_btn:hover {
            border-color: #00ffe7aa;
            box-shadow: 0 0 10px #00ffe744;
        }
        #viz_mode_btn {
            top: 52px;
            right: 4px;
        }
        #ai_toggle_btn {
            top: 104px;
            right: 4px;
        }
        #viz_mode_btn span, #ai_toggle_btn span {
            color: #00ffe7;
            font-size: clamp(1em, 3.5vw, 1.4em);
            font-family: monospace;
            letter-spacing: 0.05em;
        }

        /* ---- Info area ---- */
        #info_area {
            padding: 8px 4px;
            line-height: 1.8;
            color: #4a8fa8;
            touch-action: auto;
        }
        #info_area a {
            color: #00ffe7;
            touch-action: auto;
        }

    </style>

</head>

<body>
    <div id="container">
        <p id="score">Score: 0</p>
        <p id='gg'>Good game! <a id="refresh" href="#">Play again?</a></p>
        <canvas width='358' height='360'></canvas>
        <div id="viz_mode_btn" onclick="cycleVizMode()">
            <span id="viz_mode_label">👁 AI Overlay</span>
        </div>
        <div id="ai_toggle_btn" onclick="toggleAI()">
            <span id="ai_toggle_label">🤖 AI: ON</span>
        </div>
        <div id="mobile_controls">
            <span class="button" id="move_left"></span>
            <span class="button" id="move_right"></span>
        </div>
        <div id="info_area">
            <p>To play: Use arrow keys or buttons.</p>
            <p>Press spacebar to go fast.</p>
            <p>Toggle AI and visualization modes using the buttons.</p>
            <p>See <a href="https://github.com/Luxter/SphericalSnakeAgent" target="_blank">source on GitHub</a></p>
        </div>
        </div> <!-- #container -->
        <script>
            // Prevent double-tap-zoom on iOS:
            document.addEventListener("dblclick", (e) => {
                e.preventDefault();
            });
        </script>
    <script src='https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js'></script>
    <script src='agent_model.js'></script>
    <script src='snake.js'></script>
    <script src='agent.js'></script>
    <script>
        var _vizModes    = ["normal", "ai_only", "ai_overlay"];
        var _vizLabels   = { normal: "Normal", ai_only: "AI Only", ai_overlay: "AI Overlay" };
        var _vizModeIdx  = 2;  // start at ai_overlay (matches vizMode default in snake.js)

        function cycleVizMode() {
            _vizModeIdx = (_vizModeIdx + 1) % _vizModes.length;
            vizMode = _vizModes[_vizModeIdx];
            document.getElementById('viz_mode_label').textContent =
                '\uD83D\uDC41 ' + _vizLabels[vizMode];
            renderIfStopped();
        }

        function toggleAI() {
            aiMode = !aiMode;
            document.getElementById('ai_toggle_label').textContent =
                '\uD83E\uDD16 AI: ' + (aiMode ? 'ON' : 'OFF');
            if (!aiMode) { setLeft(false); setRight(false); }
            renderIfStopped();
        }
    </script>
    
</body>
</html>
