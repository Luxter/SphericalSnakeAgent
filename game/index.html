<!doctype html>

<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='description' content='Snake on a sphere — Teinforcement Learning Agent'>
    <meta name='author' content='Łukasz Cyran'>
    <title>Spherical Snake</title>

    <link rel="icon" type="image/png" href="icons/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0" />


    <style type='text/css'>
        * {
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body {
            background: #E1F0F5;
            font-family: monospace;
            touch-action: none;
        }
        #score, #gg {
            font-size: 2em;
            margin: 0;
            text-align: center;
            background: rgba(0,0,0,.8);
            color: #FFF;
            padding: 10px 0px;
        }
        #container {
            width: 360px;
            margin: 10px auto;
            position: relative;
        }
        #leaderboard_area {
            font-size: 1.2em;
        }
    	canvas {
    		border: 1px black solid;
    		display: block;
            background: #FFF;
    	}
        #gg {
            width: 360px;
            display: none;
            position: absolute;
            top: 200px;
        }
        .hidden {
            display: none;
        }

        #mobile_controls {
            position: relative;
            user-select: none;
            -webkit-user-select: none; /* Safari, Chrome, iOS Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* Internet Explorer/Edge */
            height: 10px;
            top: -100px;
        }

        .button {
            padding: 10px;
            background: #EEE;
            display: inline-block;
            user-select: none;
            -webkit-user-select: none; /* Safari, Chrome, iOS Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* Internet Explorer/Edge */
            border-radius: 50px;
            border: 4px #333 solid;
            position: absolute;
            cursor: pointer;
            touch-action: manipulation;
        }

        #move_left {
            vertical-align: center;
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 50px;
            left: 10px;
            top: 10px;
            background: url("icons/left.png") 18px 21px no-repeat #EEE;
        }

        #move_right {
            width: 50px;
            height: 50px;
            vertical-align: center;
            text-align: center;
            font-size: 50px;
            right: 10px;
            top: 10px;
            background: url("icons/right.png") 23px 21px no-repeat #EEE;
        }

        #mobile_controls .button.down {
            background-color: #67bfff;
        }

        #refresh {
            color: #0093fc;
            cursor: pointer;
            text-decoration: underline;
        }

        #ai_toggle_wrap {
            position: absolute;
            top: 52px;
            right: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.45);
            border-radius: 8px;
            padding: 6px 11px;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        #ai_toggle_wrap span {
            color: #fff;
            font-size: 1.2em;
            font-family: monospace;
            letter-spacing: 0.03em;
        }
        /* slider track */
        .ai-slider {
            position: relative;
            width: 54px;
            height: 28px;
            background: #555;
            border-radius: 28px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .ai-slider.on { background: #4caf50; }
        /* slider knob */
        .ai-slider::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: left 0.2s;
        }
        .ai-slider.on::after { left: 30px; }

    </style>

</head>

<body>
    <div id="container">
        <p id="score">Score: 0</p>
        <p id='gg'>Good game! <a id="refresh" href="#">Play again?</a></p>
        <canvas width='358' height='360'></canvas>
        <div id="ai_toggle_wrap" onclick="toggleAI()">
            <span>🤖 AI</span>
            <div class="ai-slider on" id="ai_slider"></div>
        </div>
        <div id="mobile_controls">
            <span class="button" id="move_left"></span>
            <span class="button" id="move_right"></span>
        </div>
        <div id="info_area">
            <p>To play: Use arrow keys or buttons.</p>
            <p>Press spacebar to go fast.</p>
            <p>See <a href="https://github.com/Luxter/SphericalSnakeAgent" target="_blank">source on GitHub</a></p>
        </div>
        </div> <!-- #container -->
        <script>
            // Prevent double-tap-zoom on iOS:
            document.addEventListener("dblclick", (e) => {
                e.preventDefault();
            });
        </script>
    <script src='https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js'></script>
    <script src='agent_model.js'></script>
    <script src='agent.js'></script>
    <script src='snake.js'></script>
    <script>
        function toggleAI() {
            aiMode = !aiMode;
            document.getElementById('ai_slider').classList.toggle('on', aiMode);
            if (!aiMode) { setLeft(false); setRight(false); }
        }
    </script>
    
</body>
</html>
